    }

      background: #fff;

      display: flex;
      flex-direction: column;

    /* HEADER */

      padding: 16px;

      justify-content: space-between;

      font-weight: 600;

      border: 1px solid rgba(255,255,255,0.4);
      color: white;

      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;

      flex: 1;
      padding: 8px 0;
      border-radius: 8px;

    }

    .nav-label {

      font-size: 14px;

    .btn-secondary {

      color: #1B5E20;
      border: 1px solid #1B5E20;
    }

    .btn-secondary:active {
      background: #e8f5e9;
    }

      display: flex;
      flex-direction: column;
      height: 100%;
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-message {
      display: flex;
      gap: 8px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-user {
      justify-content: flex-end;
    }

    .message-bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
    }

    .bubble-user {
      background: #1B5E20;
      color: white;
    }

    .bubble-assistant {
      background: #f0f7f0;
      color: #333;
      border: 1px solid #e0e0e0;
    }

    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
    }

    .chat-input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input:focus {
      border-color: #1B5E20;
    }

    .chat-send {
      background: #1B5E20;
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .chat-send:active {
      background: #164620;
    }

    /* GARDEN SCREEN */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      border: 1px solid #1B5E20;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #1B5E20;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: #2e5f35;
      font-weight: 500;
    }

    .health-section {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .health-title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
    }

    .health-bar-bg {
      background: #e0e0e0;
      height: 12px;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .health-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #1B5E20 0%, #4CAF50 100%);
      transition: width 0.3s;
    }

    .health-text {
      font-size: 12px;
      color: #666;
      text-align: right;
    }

    .plant-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .plant-item {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .plant-item:active {
      background: #f9f9f9;
      transform: translateX(4px);
    }

    .plant-icon {
      font-size: 32px;
    }

    .plant-info {
      flex: 1;
    }

    .plant-name {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }

    .plant-status {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 12px;
      width: fit-content;
      font-weight: 500;
    }

    .status-treating {
      background: #fff3e0;
      color: #e65100;
    }

    .status-recovered {
      background: #e8f5e9;
      color: #1B5E20;
    }

    /* PLANTS SCREEN */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-text {
      font-size: 14px;
      margin-bottom: 8px;
    }

    /* PLANT DETAIL SCREEN */
    .detail-header {
      background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 100%);
      color: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 20px;
    }

    .detail-icon {
      font-size: 56px;
      margin-bottom: 8px;
    }

    .detail-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .detail-subtitle {
      font-size: 12px;
      opacity: 0.9;
    }

    .timeline {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .timeline-item {
      display: flex;
      gap: 12px;
    }

    .timeline-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #1B5E20;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .timeline-content {
      flex: 1;
    }

    .timeline-date {
      font-size: 12px;
      color: #999;
      margin-bottom: 2px;
    }

    .timeline-text {
      font-size: 13px;
      color: #333;
    }

    .note-input-area {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .note-input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }

    .note-input:focus {
      border-color: #1B5E20;
    }

    .note-btn {
      background: #1B5E20;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }

    .note-btn:active {
      background: #164620;
    }

    /* TIPS SCREEN */
    .season-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: #1B5E20;
      color: white;
      border-color: #1B5E20;
    }

    .season-header {
      background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 100%);
      color: white;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .season-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .season-months {
      font-size: 12px;
      opacity: 0.9;
    }

    .tips-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    .tip-card {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.5;

      font-weight: 500;
      color: #f57f17;

    .pro-tip-icon {
      font-size: 24px;
      margin-bottom: 8px;

    /* UTILITY CLASSES */
    .back-button {
      background: transparent;
      border: none;
      color: #1B5E20;
      cursor: pointer;
      font-size: 16px;
      padding: 8px;
      margin: -8px 0 0 -8px;
      font-weight: 600;
    }

    .back-button:active {
      opacity: 0.7;
    }

    /* SCROLLBAR */
    .screen-container::-webkit-scrollbar {
      width: 6px;
    }

    .screen-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .screen-container::-webkit-scrollbar-thumb {
      background: #ddd;
      border-radius: 3px;
    }

    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: #ddd;
      border-radius: 2px;
    }
  </style>

          : `To protect your ${currentCrop?.nameEn || "plants"}: Rotate crops each season. Use resistant varieties when available. Proper spacing is essential for air circulation.`;
      }
      if (msg.includes("spread") || msg.includes("ምልሕላፍ")) {
        return isTi
          ? "ሕማም ናብ ካልእ ኣታኽልቲ ከይላባዕ: ዝተጠቕዑ ኣታኽልቲ ሽዑ ኣልዕል። ናውቲ ድሕሪ ምጥቃም ብፈላ ማይ ኣጽሪ።"
          : "To prevent spreading: Remove affected plants immediately. Clean your tools with boiling water between plants.";
      }
      if (msg.includes("when") || msg.includes("ማዓስ") || msg.includes("time")) {
        return isTi
          ? "ምሕዋይ ግዜ ይወስድ። ሕክምና እንተ ጀሚርካ 1-2 ሰሙን ውሽጢ ለውጢ ክትርኢ ኣለካ።"
          : "Recovery depends on how early you caught the problem. With proper treatment, you should see improvement within 1-2 weeks.";
      }
      if (msg.includes("soil") || msg.includes("መሬት")) {
        return isTi
          ? "ጥዕና መሬት ኣዝዩ ኣገዳሲ እዩ። ድዅዒ ወይ ብርባ ተሓንጢ ወስኽ ንመሬት ምስባሕ።"
          : "Soil health is the foundation of everything. Add compost or aged manure to build organic matter.";
      }

      if (currentDisease) {
        return isTi
          ? `ብዛዕባ ${currentDisease.nameTi} ዝያዳ ክሕግዘካ ይኽእል። ሕቶ ሕተተኒ።`
          : `I can help you more with ${currentDisease.nameEn}. Ask me anything about it.`;
      }
      return isTi
        ? "ስእሊ ናይ ኣታኽልትኻ ስደድ ወይ ሕቶ ሕተተኒ።"
        : "Send me a photo or ask me about your plants!";
    };

    // STATE MANAGEMENT
    let state = {
      screen: "home",
      lang: "ti",
      diagnosisResult: null,
      isScanning: false,
      scanProgress: 0,
      chatMessages: [
        {
          id: 1,
          type: "assistant",
          text: t(
            "ሰላም! ኣታኽልትካ ንምሕላው ኢ ገዲስካ። ስእሊ ይድገፍ ወይ ስኳ ሕተተኒ።",
            "Hello! I'm here to help protect your crops. Send a photo or ask me anything about plant health.",
            "ti"
          ),
        },
      ],
      myPlants: [],
      selectedPlantId: null,
      currentSeason: "kremti",
      nextChatId: 2,
    };

    // RENDER FUNCTION
    function render() {
      const app = document.getElementById("root");
      app.innerHTML = "";

      // Header
      const header = document.createElement("div");
      header.className = "header";
      header.innerHTML = `
        <div class="header-title">ጽቡቕ ተኽሊ</div>
        <button class="lang-toggle">${state.lang === "ti" ? "EN" : "ትግርኛ"}</button>
      `;
      header.querySelector(".lang-toggle").addEventListener("click", () => {
        state.lang = state.lang === "ti" ? "en" : "ti";
        render();
      });
      app.appendChild(header);

      // Screen Container
      const screenContainer = document.createElement("div");
      screenContainer.className = "screen-container";
      const content = document.createElement("div");
      content.className = "screen-content";

      if (state.screen === "home") {
        content.innerHTML = renderHome();
      } else if (state.screen === "garden") {
        content.innerHTML = renderGarden();
      } else if (state.screen === "plants") {
        content.innerHTML = renderPlants();
      } else if (state.screen === "plant-detail") {
        content.innerHTML = renderPlantDetail();
      } else if (state.screen === "diagnosis") {
        content.innerHTML = renderDiagnosis();
      } else if (state.screen === "chat") {
        content.innerHTML = renderChat();
      } else if (state.screen === "tips") {
        content.innerHTML = renderTips();
      }

      screenContainer.appendChild(content);
      app.appendChild(screenContainer);

      // Bottom Navigation
      const nav = document.createElement("div");
      nav.className = "bottom-nav";
      nav.innerHTML = `
        <div class="nav-item ${state.screen === "home" ? "active" : ""}">
          <div class="nav-icon">🏠</div>
          <div class="nav-label">${t("መዋዕል", "Home", state.lang)}</div>
        </div>
        <div class="nav-item ${state.screen === "garden" ? "active" : ""}">
          <div class="nav-icon">🌱</div>
          <div class="nav-label">${t("ጀርዲን", "Garden", state.lang)}</div>
        </div>
        <div class="nav-center">📱</div>
        <div class="nav-item ${state.screen === "plants" ? "active" : ""}">
          <div class="nav-icon">🌿</div>
          <div class="nav-label">${t("ኣታኽልቲ", "Plants", state.lang)}</div>
        </div>
        <div class="nav-item ${state.screen === "tips" ? "active" : ""}">
          <div class="nav-icon">💡</div>
          <div class="nav-label">${t("ምክሊ", "Tips", state.lang)}</div>
        </div>
      `;

      nav.children[0].addEventListener("click", () => {
        state.screen = "home";
        render();
      });
      nav.children[1].addEventListener("click", () => {
        state.screen = "garden";
        render();
      });
      nav.children[2].addEventListener("click", () => {
        state.screen = "diagnosis";
        state.isScanning = true;
        state.scanProgress = 0;
        render();
        startScanning();
      });
      nav.children[3].addEventListener("click", () => {
        state.screen = "plants";
        render();
      });
      nav.children[4].addEventListener("click", () => {
        state.screen = "tips";
        render();
      });

      app.appendChild(nav);

      // Scanning Overlay
      if (state.isScanning) {
        const overlay = document.createElement("div");
        overlay.className = "scan-overlay";
        overlay.innerHTML = `
          <div class="viewfinder">
            <div class="scan-line"></div>
          </div>
          <div class="scan-progress">
            <div class="scan-percentage">${state.scanProgress}%</div>
            <div class="scan-text">${t("ስእሊ ሰሪሕ...", "Scanning...", state.lang)}</div>
          </div>
        `;
        app.appendChild(overlay);
      }
    }

    function renderHome() {
      const cropEntries = Object.entries(CROPS);
      const cropGrid = cropEntries
        .map(
          ([key, crop]) =>
            `<div class="crop-item" data-crop="${key}">
        <div class="crop-icon">${crop.icon}</div>
        <div class="crop-name">${t(crop.nameTi, crop.nameEn, state.lang)}</div>
      </div>`
        )
        .join("");

      return `
        <div class="hero-card">
          <div class="hero-icon">🌱</div>
          <div class="hero-title">${t("ጽቡቕ ተኽሊ", "Healthy Plant", state.lang)}</div>
          <div class="hero-subtitle">${t(
        "ንኤርትራዊ ሓርሳ",
        "For Eritrean Farmers",
        state.lang
      )}</div>
          <button class="scan-button">${t("ስእሊ ልድ", "Scan Now", state.lang)}</button>
        </div>

        <div class="quick-actions">
          <div class="action-tile">
            <div class="action-icon">🌳</div>
            <div class="action-label">${t("ሰፈርቲ", "My Garden", state.lang)}</div>
          </div>
          <div class="action-tile">
            <div class="action-icon">📅</div>
            <div class="action-label">${t("ወቕታዊ ምክሊ", "Seasonal Tips", state.lang)}</div>
          </div>
          <div class="action-tile">
            <div class="action-icon">📋</div>
            <div class="action-label">${t("ተከታታይ ዝራእቲ", "Tracked Plants", state.lang)}</div>
          </div>
          <div class="action-tile">
            <div class="action-icon">💬</div>
            <div class="action-label">${t("ሕቶ ሕተተ", "Ask AI", state.lang)}</div>
          </div>
        </div>

        <div class="crops-grid">${cropGrid}</div>

        <div class="offline-banner">
          ✓ ${t("ብምንም ኢንተርነት ይሰራ", "Works Offline", state.lang)}
        </div>
      `;
    }

    function renderGarden() {
      const treating = state.myPlants.filter((p) => p.status === "treating").length;
      const recovered = state.myPlants.filter((p) => p.status === "recovered").length;
      const total = state.myPlants.length;
      const health = total > 0 ? Math.round(((total - treating) / total) * 100) : 0;

      let plantListHtml = state.myPlants
        .map(
          (plant) =>
            `<div class="plant-item" data-plant-id="${plant.id}">
        <div class="plant-icon">${CROPS[plant.crop].icon}</div>
        <div class="plant-info">
          <div class="plant-name">${plant.name}</div>
          <div class="plant-status ${
              plant.status === "treating"
                ? "status-treating"
                : "status-recovered"
            }">
            ${plant.status === "treating"
              ? t("ሕክምና", "Treating", state.lang)
              : t("ረኺበት", "Recovered", state.lang)
            }
          </div>
        </div>
      </div>`
        )
        .join("");

      if (state.myPlants.length === 0) {
        plantListHtml = `<div class="empty-state">
        <div class="empty-icon">🌱</div>
        <div class="empty-text">${t(
          "ኣታኽልቲ ትከላ ታሕሳስ",
          "No plants tracked yet",
          state.lang
        )}</div>
      </div>`;
      }

      return `
        <h2>${t("ጀርዲን", "My Garden", state.lang)}</h2>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-number">${total}</div>
            <div class="stat-label">${t("ሙሉእ", "Total", state.lang)}</div>
          </div>
          <div class="stat-card">
            <div class="stat-number">${treating}</div>
            <div class="stat-label">${t("ሕክምና", "Treating", state.lang)}</div>
          </div>
          <div class="stat-card">
            <div class="stat-number">${recovered}</div>
            <div class="stat-label">${t("ረኺበት", "Recovered", state.lang)}</div>
          </div>
        </div>

        <div class="health-section">
          <div class="health-title">${t("ጥዕና ጀርዲን", "Garden Health", state.lang)}</div>
          <div class="health-bar-bg">
            <div class="health-bar-fill" style="width: ${health}%"></div>
          </div>
          <div class="health-text">${health}%</div>
        </div>

        <div class="plant-list">
          ${plantListHtml}
        </div>
      `;
    }

    function renderPlants() {
      let html = state.myPlants
        .map(
          (plant) =>
            `<div class="plant-item" data-plant-id="${plant.id}">
        <div class="plant-icon">${CROPS[plant.crop].icon}</div>
        <div class="plant-info">
          <div class="plant-name">${plant.name}</div>
          <div class="plant-status ${
              plant.status === "treating"
                ? "status-treating"
                : "status-recovered"
            }">
            ${plant.status === "treating"
              ? t("ሕክምና", "Treating", state.lang)
              : t("ረኺበት", "Recovered", state.lang)
            }
          </div>
        </div>
      </div>`
        )
        .join("");

      if (state.myPlants.length === 0) {
        html = `<div class="empty-state">
        <div class="empty-icon">🌿</div>
        <div class="empty-text">${t(
          "ኣታኽልቲ ትከላ ታሕሳስ",
          "No plants tracked yet",
          state.lang
        )}</div>
      </div>`;
      }

      return `
        <h2>${t("ተከታታይ ዝራእቲ", "Tracked Plants", state.lang)}</h2>
        <div class="plant-list">
          ${html}
        </div>
      `;
    }

    function renderPlantDetail() {
      const plant = state.myPlants.find((p) => p.id === state.selectedPlantId);
      if (!plant) return `<div>${t("ኣታኽልቲ ዘይወሃበ", "Plant not found", state.lang)}</div>`;

      const crop = CROPS[plant.crop];
      const timeline = plant.timeline
        .map(
          (event) =>
            `<div class="timeline-item">
        <div class="timeline-dot"></div>
        <div class="timeline-content">
          <div class="timeline-date">${event.date}</div>
          <div class="timeline-text">${event.text}</div>
        </div>
      </div>`
        )
        .join("");

      return `
        <button class="back-button" data-action="back-plant-detail">← ${t(
        "ተመለሰ",
        "Back",
        state.lang
      )}</button>

        <div class="detail-header">
          <div class="detail-icon">${crop.icon}</div>
          <div class="detail-name">${plant.name}</div>
          <div class="detail-subtitle">${t(crop.nameTi, crop.nameEn, state.lang)}</div>
        </div>

        <div class="health-section">
          <div class="health-title">${t("ጥዕና ኣታኽልቲ", "Plant Health", state.lang)}</div>
          <div class="health-bar-bg">
            <div class="health-bar-fill" style="width: ${plant.health}%"></div>
          </div>
          <div class="health-text">${plant.health}%</div>
        </div>

        <div class="section-label">${t("ታሪክ", "Timeline", state.lang)}</div>
        <div class="timeline">
          ${timeline}
        </div>

        <div class="section-label">${t("ድሌት ወስኽ", "Add Note", state.lang)}</div>
        <div class="note-input-area">
          <input type="text" class="note-input" placeholder="${t(
        "ድሌት ክትብል",
        "Your note...",
        state.lang
      )}" id="note-input-${plant.id}">
          <button class="note-btn" data-plant-id="${plant.id}">${t("ወስኽ", "Add", state.lang)}</button>
        </div>
      `;
    }

    function renderDiagnosis() {
      if (!state.diagnosisResult) {
        return `<div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-text">${t(
          "ምንም ምርመራ ዘይግበር",
          "No diagnosis yet",
          state.lang
        )}</div>
      </div>`;
      }

      const { disease, crop } = state.diagnosisResult;
      const sev = severityConfig[disease.severity];

      return `
        <button class="back-button" data-action="back-diagnosis">← ${t(
        "ተመለሰ",
        "Back",
        state.lang
      )}</button>

        <div class="diagnosis-container">
          <div class="diagnosis-icon">${crop.icon}</div>
          <div class="diagnosis-title">${t(disease.nameTi, disease.nameEn, state.lang)}</div>
          <div class="diagnosis-title-en">${t(disease.nameEn, disease.nameTi, state.lang)}</div>

          <div class="severity-badge" style="background: ${sev.bg}; color: ${sev.color};">
            ${sev.icon} ${t(sev.labelTi, sev.labelEn, state.lang)}
          </div>

          <div class="section-label">${t("ምስጢር", "Confidence", state.lang)}</div>
          <div class="confidence-bar">
            <div class="confidence-fill" style="width: ${disease.confidence}%"></div>
          </div>
          <div style="font-size: 12px; color: #666; margin-bottom: 16px;">${disease.confidence}%</div>

          <div class="section-label">${t("ምልክታት", "Symptoms", state.lang)}</div>
          <div class="section-content">${t(
        disease.symptomsTi,
        disease.symptomsEn,
        state.lang
      )}</div>

          <div class="section-label">${t("ሕክምና", "Treatment", state.lang)}</div>
          <div class="section-content">${t(disease.remedyTi, disease.remedyEn, state.lang)}</div>

          <div class="section-label">${t("ምክልኻል", "Prevention", state.lang)}</div>
          <div class="section-content">${t(
        disease.preventionTi,
        disease.preventionEn,
        state.lang
      )}</div>

          <div class="action-buttons">
            <button class="btn btn-primary" data-action="save-plant">${t(
        "ጀርዲን ውሰድ",
        "Save to Garden",
        state.lang
      )}</button>
            <button class="btn btn-secondary" data-action="scan-another">${t(
        "ካሎ ልድ",
        "Scan Another",
        state.lang
      )}</button>
          </div>
        </div>
      `;
    }

    function renderChat() {
      const messagesHtml = state.chatMessages
        .map(
          (msg) =>
            `<div class="chat-message ${msg.type === "user" ? "message-user" : ""}">
        <div class="message-bubble ${msg.type === "user" ? "bubble-user" : "bubble-assistant"}">
          ${msg.text}
        </div>
      </div>`
        )
        .join("");

      return `
        <div class="chat-container" style="margin: -16px -16px 0 -16px; height: calc(100vh - 180px); border-radius: 0; box-shadow: none;">
          <div class="chat-messages">
            ${messagesHtml}
          </div>
          <div class="chat-input-area">
            <input type="text" class="chat-input" id="chat-input" placeholder="${t(
        "ሕቶ ሕተተ...",
        "Ask me...",
        state.lang
      )}">
            <button class="chat-send">📤</button>
          </div>
        </div>
      `;
    }

    function renderTips() {
      const seasons = ["kremti", "hagay", "azmera"];
      const seasonTabs = seasons
        .map(
          (s) =>
            `<button class="tab-btn ${state.currentSeason === s ? "active" : ""}" data-season="${s}">
        ${t(SEASONAL_TIPS[s].nameTi, SEASONAL_TIPS[s].nameEn, state.lang)}
      </button>`
        )
        .join("");

      const currentTips = SEASONAL_TIPS[state.currentSeason];
      const tipsHtml = currentTips.tips
        .map((tip) => `<div class="tip-card">${t(tip.ti, tip.en, state.lang)}</div>`)
        .join("");

      return `
        <h2>${t("ወቕታዊ ምክሊ", "Seasonal Tips", state.lang)}</h2>

        <div class="season-tabs">
          ${seasonTabs}
        </div>

        <div class="season-header">
          <div class="season-name">${t(currentTips.nameTi, currentTips.nameEn, state.lang)}</div>
          <div class="season-months">${currentTips.months}</div>
        </div>

        <div class="tips-list">
          ${tipsHtml}
        </div>

        <div class="pro-tip-box">
          <div class="pro-tip-icon">⭐</div>
          <div>${t(
        "ጥዕና መሬት ግዜ ሰኦ ንጅብ ይሕግዝ",
        "Healthy soil is the best investment",
        state.lang
      )}</div>
        </div>
      `;
    }

    function startScanning() {
      const interval = setInterval(() => {
        state.scanProgress += Math.random() * 20;
        if (state.scanProgress >= 100) {
          state.scanProgress = 100;
          clearInterval(interval);
          setTimeout(() => {
            state.isScanning = false;
            const disease = DISEASES[Math.floor(Math.random() * DISEASES.length)];
            const crop = CROPS[disease.crop];
            state.diagnosisResult = { disease, crop };
            state.screen = "diagnosis";
            render();
            attachEventListeners();
          }, 500);
        } else {
          render();
        }
      }, 400);
    }

    function attachEventListeners() {
      // Home screen
      document.querySelectorAll(".scan-button").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.screen = "diagnosis";
          state.isScanning = true;
          state.scanProgress = 0;
          render();
          startScanning();
        });
      });

      document.querySelectorAll(".action-tile").forEach((tile, idx) => {
        tile.addEventListener("click", () => {
          if (idx === 0) state.screen = "garden";
          else if (idx === 1) state.screen = "tips";
          else if (idx === 2) state.screen = "plants";
          else if (idx === 3) state.screen = "chat";
          render();
          if (state.screen === "chat") attachEventListeners();
        });
      });

      // Garden and plants plant items
      document.querySelectorAll(".plant-item").forEach((item) => {
        item.addEventListener("click", () => {
          const plantId = parseInt(item.dataset.plantId);
          state.selectedPlantId = plantId;
          state.screen = "plant-detail";
          render();
          attachEventListeners();
        });
      });

      // Plant detail back button
      document.querySelector("[data-action='back-plant-detail']")?.addEventListener("click", () => {
        state.selectedPlantId = null;
        state.screen = "plants";
        render();
        attachEventListeners();
      });

      // Diagnosis buttons
      document.querySelector("[data-action='save-plant']")?.addEventListener("click", () => {
        const { disease, crop } = state.diagnosisResult;
        const plant = {
          id: Date.now(),
          crop: disease.crop,
          name: `${t(crop.nameTi, crop.nameEn, state.lang)} (${new Date().toLocaleDateString()})`,
          status: "treating",
          health: 40,
          timeline: [
            {
              date: new Date().toLocaleDateString(),
              text: t(disease.nameTi, disease.nameEn, state.lang),
            },
          ],
        };
        state.myPlants.push(plant);
        state.screen = "garden";
        state.diagnosisResult = null;
        render();
        attachEventListeners();
      });

      document.querySelector("[data-action='scan-another']")?.addEventListener("click", () => {
        state.diagnosisResult = null;
        state.screen = "home";
        render();
        attachEventListeners();
      });

      document.querySelector("[data-action='back-diagnosis']")?.addEventListener("click", () => {
        state.diagnosisResult = null;
        state.screen = "home";
        render();
        attachEventListeners();
      });

      // Chat
      const chatInput = document.getElementById("chat-input");
      const chatSend = document.querySelector(".chat-send");
      if (chatInput && chatSend) {
        const sendMessage = () => {
          const text = chatInput.value.trim();
          if (!text) return;
          state.chatMessages.push({
            id: state.nextChatId++,
            type: "user",
            text,
          });
          const response = generateResponse(text, {
            currentDisease: state.diagnosisResult?.disease,
            currentCrop: state.diagnosisResult?.crop,
          }, state.lang);
          state.chatMessages.push({
            id: state.nextChatId++,
            type: "assistant",
            text: response,
          });
          chatInput.value = "";
          render();
          attachEventListeners();
          setTimeout(() => {
            const chatMessages = document.querySelector(".chat-messages");
            if (chatMessages) chatMessages.scrollTop = chatMessages.scrollHeight;
          }, 0);
        };
        chatInput.addEventListener("keypress", (e) => {
          if (e.key === "Enter") sendMessage();
        });
        chatSend.addEventListener("click", sendMessage);
      }

      // Season tabs
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.currentSeason = btn.dataset.season;
          render();
          attachEventListeners();
        });
      });

      // Plant detail notes
      document.querySelectorAll(".note-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const plantId = parseInt(btn.dataset.plantId);
          const input = document.getElementById(`note-input-${plantId}`);
          const note = input.value.trim();
          if (!note) return;
          const plant = state.myPlants.find((p) => p.id === plantId);
          if (plant) {
            plant.timeline.push({
              date: new Date().toLocaleDateString(),
              text: note,
            });
            input.value = "";
            render();
            attachEventListeners();
          }
        });
      });
    }

    // INITIALIZE
    render();
    attachEventListeners();

    // Service Worker
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(() => {
        // SW not available, app still works
      });
    }
  </script>
</body>
</html>
