                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, padding: "0 16px", marginBottom: 20 }}>
                  <div style={{ background: "#fff", borderRadius: 16, padding: "16px 12px", textAlign: "center", boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
                    <div style={{ fontSize: 28, fontWeight: 800, color: "#333" }}>{total}</div>
                    <div style={{ fontSize: 11, color: "#888", fontWeight: 600 }}>{t("ጠቕላላ", "Total")}</div>
                  </div>
                  <div style={{ background: "#FFF3E0", borderRadius: 16, padding: "16px 12px", textAlign: "center" }}>
                    <div style={{ fontSize: 28, fontWeight: 800, color: "#E65100" }}>{treating}</div>
                    <div style={{ fontSize: 11, color: "#E65100", fontWeight: 600 }}>{t("ይሕከም", "Treating")}</div>
                  </div>
                  <div style={{ background: "#E8F5E9", borderRadius: 16, padding: "16px 12px", textAlign: "center" }}>
                    <div style={{ fontSize: 28, fontWeight: 800, color: "#2E7D32" }}>{recovered}</div>
                    <div style={{ fontSize: 11, color: "#2E7D32", fontWeight: 600 }}>{t("ተሓውዩ", "Recovered")}</div>
                  </div>
                </div>

                {/* Health bar */}
                {total > 0 && (
                  <div style={{ padding: "0 16px", marginBottom: 20 }}>
                    <div style={{ background: "#fff", borderRadius: 16, padding: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: "#333", marginBottom: 8 }}>
                        {t("ጥዕና ጀርዲን", "Garden Health")}
                      </div>
                      <div style={{ height: 12, borderRadius: 6, background: "#F0F0F0", overflow: "hidden", display: "flex" }}>
                        <div style={{ width: `${(recovered / total) * 100}%`, background: "linear-gradient(90deg, #4CAF50, #66BB6A)", transition: "width 0.5s" }} />
                        <div style={{ width: `${(treating / total) * 100}%`, background: "linear-gradient(90deg, #FF9800, #FFB74D)", transition: "width 0.5s" }} />
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6, fontSize: 11, color: "#888" }}>
                        <span>{Math.round((recovered / total) * 100)}% {t("ጥዑይ", "healthy")}</span>
                        <span>{Math.round((treating / total) * 100)}% {t("ይሕከም", "treating")}</span>
                      </div>
                    </div>
                  </div>
                )}

                {/* Plant list */}
                <div style={{ padding: "0 0 8px" }}>
                  {myPlants.map((plant) => (
                    <div
                      key={plant.id}
                      style={styles.plantCard(plant.status)}
                      onClick={() => { setSelectedPlant(plant); setScreen("plantDetail"); }}
                    >
                      <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                        <span style={{ fontSize: 32 }}>{plant.crop.icon}</span>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 14, fontWeight: 700, color: "#333" }}>
                            {lang === "ti" ? plant.crop.nameTi : plant.crop.nameEn}
                          </div>
                          <div style={{ fontSize: 12, color: "#888" }}>
                            {lang === "ti" ? plant.disease.nameTi : plant.disease.nameEn}
                          </div>
                        </div>
                        <div style={styles.plantStatus(plant.status)}>
                          {plant.status === "recovered" ? "✅" : "⏳"}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        );
      };

      // --- SEASONAL TIPS ---
      const TipsScreen = () => (
        <div>
          <div style={{ padding: "20px 16px 12px" }}>
            <h2 style={{ fontSize: 18, fontWeight: 800, color: "#333", margin: 0 }}>
              📅 {t("ወቕታዊ ምኽሪ", "Seasonal Tips")}
            </h2>
            <p style={{ fontSize: 12, color: "#888", margin: "4px 0 0" }}>
              {t("ንወቕቲ ዝሰማማዕ ምኽሪ", "Advice tailored to the current season")}
            </p>
          </div>

          <div style={{ display: "flex", gap: 10, padding: "0 16px", marginBottom: 20, overflowX: "auto" }}>
            {Object.entries(SEASONAL_TIPS).map(([key, season]) => (
              <div
                key={key}
                style={styles.seasonCard(currentSeason === key)}
                onClick={() => setCurrentSeason(key)}
              >
                <div style={{ fontSize: 13, fontWeight: 700 }}>
                  {lang === "ti" ? season.nameTi : season.nameEn}
                </div>
                <div style={{ fontSize: 10, opacity: 0.8, marginTop: 2 }}>{season.months}</div>
              </div>
            ))}
          </div>

          <div style={{ padding: "0 16px" }}>
            {SEASONAL_TIPS[currentSeason].tips.map((tip, i) => (
              <div key={i} style={styles.tipCard}>
                <div style={{ width: 32, height: 32, borderRadius: "50%", background: "linear-gradient(135deg, #E8F5E9, #C8E6C9)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>
                  {["🌧️", "💧", "🐛", "🌾"][i % 4]}
                </div>
                <div style={{ fontSize: 13, color: "#444", lineHeight: 1.6 }}>
                  {lang === "ti" ? tip.ti : tip.en}
                </div>
              </div>
            ))}
          </div>

          {/* Crop calendar */}
          <div style={{ padding: "20px 16px 0" }}>
            <div style={{
              background: "linear-gradient(135deg, #E8F5E9, #C8E6C9)",
              borderRadius: 16,
              padding: 20,
            }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: "#1B5E20", marginBottom: 8 }}>
                💡 {t("ፍሉይ ምኽሪ", "Pro Tip")}
              </div>
              <div style={{ fontSize: 13, color: "#2E7D32", lineHeight: 1.7 }}>
                {currentSeason === "kremti"
                  ? t(
                      "ኣብ ክረምቲ ኣዘውቲርካ ኣታኽልትኻ ፈትሽ — ሕማም ኣብ ዝናባዊ ወቕቲ ቀልጢፉ ይዝርጋሕ። ኣብ ሰሙን ሓደ ግዜ ስኣል።",
                      "During kremti, inspect your crops frequently — diseases spread fast in wet conditions. Scan at least once a week."
                    )
                  : currentSeason === "hagay"
                  ? t(
                      "ኣብ ሓጋይ ማይ ምቚጣብ ኣገዳሲ እዩ። ንግሆ ቀልጢፍካ ወይ ምሸት ኣፍስስ ንኽትቍጥብ።",
                      "During hagay, water conservation is key. Water early morning or evening to minimize evaporation."
                    )
                  : t(
                      "ኣዝመራ ንምድላው ዝበለጸ ግዜ እዩ — መሬት ሕረስ፡ ዘርኢ ኣዳሉ፡ ንክረምቲ ተዳሉ።",
                      "Azmera is the best time to prepare — plow fields, organize seeds, and get ready for the main season."
                    )}
              </div>
            </div>
          </div>
        </div>
      );

      // --- SCANNING OVERLAY ---
      const ScanningOverlay = () => (
        <div style={styles.scanOverlay}>
          <div style={{ color: "#fff", fontSize: 14, fontWeight: 600, marginBottom: 20, textAlign: "center" }}>
            {t("ኣታኽልቲ ይስእል ኣሎ...", "Scanning plant...")}
          </div>
          <div style={styles.scanViewfinder}>
            <div style={{ fontSize: 64, opacity: 0.3 }}>🌿</div>
            <div style={styles.scanLine(scanProgress)} />
            {/* Corner markers */}
            {[
              { top: 0, left: 0, borderTop: "3px solid #4CAF50", borderLeft: "3px solid #4CAF50" },
              { top: 0, right: 0, borderTop: "3px solid #4CAF50", borderRight: "3px solid #4CAF50" },
              { bottom: 0, left: 0, borderBottom: "3px solid #4CAF50", borderLeft: "3px solid #4CAF50" },
              { bottom: 0, right: 0, borderBottom: "3px solid #4CAF50", borderRight: "3px solid #4CAF50" },
            ].map((pos, i) => (
              <div key={i} style={{ position: "absolute", width: 30, height: 30, ...pos }} />
            ))}
          </div>
          <div style={{ marginTop: 24, width: 200 }}>
            <div style={{ height: 4, borderRadius: 2, background: "rgba(255,255,255,0.2)", overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${scanProgress}%`, background: "#4CAF50", borderRadius: 2, transition: "width 0.1s" }} />
            </div>
            <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 12, textAlign: "center", marginTop: 8 }}>
              Gemma 4 · {t("ይመርምር ኣሎ", "Analyzing")}... {scanProgress}%
            </div>
          </div>
        </div>
      );

      // ============================================================
      // RENDER
      // ============================================================
      const screens = {
        home: HomeScreen,
        diagnosis: DiagnosisScreen,
        chat: ChatScreen,
        plants: PlantsScreen,
        plantDetail: PlantDetailScreen,
        garden: GardenScreen,
        tips: TipsScreen,
      };
      const CurrentScreen = screens[screen] || HomeScreen;

      return (
        <div style={styles.app}>
          {/* Header */}
          <div style={styles.header}>
            <div>
              <div style={styles.headerTitle}>
                {screen !== "home" && (
                  <button style={styles.backBtn} onClick={() => setScreen(screen === "plantDetail" ? "plants" : "home")}>
                    ←
                  </button>
                )}
                🌱 ጽቡቕ ተኽሊ
              </div>
              <div style={styles.headerSub}>Tsibuk Teklil · Plant Health AI</div>
            </div>
            <button
              style={styles.langToggle}
              onClick={() => setLang((l) => (l === "ti" ? "en" : "ti"))}
            >
              {lang === "ti" ? "EN" : "ትግ"}
            </button>
          </div>

          {/* Content */}
          <div style={styles.content}>
            <CurrentScreen />
          </div>

          {/* Navigation */}
          <div style={styles.nav}>
            {[
              { id: "home", icon: "🏠", label: t("ገዛ", "Home") },
              { id: "garden", icon: "🏡", label: t("ጀርዲን", "Garden") },
              { id: "scan", icon: "📸", label: t("ስኣል", "Scan"), action: handleScan },
              { id: "plants", icon: "📋", label: t("ዝርዝር", "Plants") },
              { id: "tips", icon: "📅", label: t("ምኽሪ", "Tips") },
            ].map((item) => (
              <div
                key={item.id}
                style={styles.navItem(screen === item.id || (item.id === "scan" && isScanning))}
                onClick={() => (item.action ? item.action() : setScreen(item.id))}
              >
                <span style={{
                  ...styles.navIcon(screen === item.id),
                  ...(item.id === "scan" ? {
                    background: "linear-gradient(135deg, #1B5E20, #4CAF50)",
                    borderRadius: "50%",
                    width: 48,
                    height: 48,
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    marginTop: -24,
                    boxShadow: "0 4px 16px rgba(27,94,32,0.3)",
                    filter: "none",
                  } : {}),
                }}>
                  {item.icon}
                </span>
                <span>{item.label}</span>
              </div>
            ))}
          </div>

          {/* Scanning Overlay */}
          {isScanning && <ScanningOverlay />}
        </div>
      );
    }

    // Render the app
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(TsibukTeklil));
  </script>
</body>
</html>
