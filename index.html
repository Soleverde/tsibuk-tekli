<!DOCTYPE html>
<html lang="ti">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1B5E20">
<link rel="manifest" href="./manifest.json">
<title>ጽቡቕ ተኽሊ | Tsibuk Teklil</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F0F7F0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:linear-gradient(180deg,#F0F7F0,#E8F5E9 50%,#F5F5F0);position:relative;padding-bottom:80px}

/* Header */
.hdr{background:linear-gradient(135deg,#1B5E20,#2E7D32,#388E3C);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(27,94,32,.3)}
.hdr-left{display:flex;align-items:center;gap:8px}
.hdr h1{color:#fff;font-size:18px;font-weight:800}
.hdr small{color:rgba(255,255,255,.75);font-size:10px;display:block;margin-top:1px}
.hdr .back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px 8px 4px 0;display:none}
.hdr .lang{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:5px 14px;color:#fff;font-size:12px;font-weight:600;cursor:pointer}

/* Nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid #E0E0E0;display:flex;justify-content:space-around;align-items:flex-end;padding:6px 0 10px;z-index:100;box-shadow:0 -4px 16px rgba(0,0,0,.06)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:#aaa;font-size:10px;font-weight:500;padding:4px 10px;transition:color .2s}
.nav-item.active{color:#1B5E20;font-weight:700}
.nav-item .ico{font-size:20px;transition:filter .2s}
.nav-item:not(.active) .ico{filter:grayscale(1);opacity:.6}
.nav-item.scan-btn .ico{background:linear-gradient(135deg,#1B5E20,#4CAF50);border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;margin-top:-22px;box-shadow:0 4px 16px rgba(27,94,32,.3);filter:none!important;opacity:1!important}

/* Cards */
.hero{margin:16px;background:linear-gradient(135deg,#1B5E20,#2E7D32 60%,#43A047);border-radius:24px;padding:28px 20px;color:#fff;text-align:center;box-shadow:0 8px 32px rgba(27,94,32,.3);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;opacity:.08;background-image:radial-gradient(circle at 20% 80%,#fff 1px,transparent 1px),radial-gradient(circle at 80% 20%,#fff 1px,transparent 1px);background-size:30px 30px}
.hero>*{position:relative;z-index:1}
.hero h2{font-size:21px;font-weight:800;margin:6px 0 4px}
.hero p{font-size:13px;opacity:.9;line-height:1.5}
.hero .tag{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.2);border-radius:12px;padding:3px 10px;font-size:10px;margin-top:6px}
.scan-btn-hero{display:inline-flex;align-items:center;gap:8px;background:#fff;color:#1B5E20;border:none;border-radius:50px;padding:14px 32px;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px;box-shadow:0 4px 16px rgba(0,0,0,.15);transition:transform .2s}
.scan-btn-hero:active{transform:scale(.96)}

/* Quick actions grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-top:16px}
.qcard{background:#fff;border-radius:16px;padding:16px 14px;display:flex;flex-direction:column;gap:6px;cursor:pointer;border:2px solid transparent;box-shadow:0 2px 8px rgba(0,0,0,.04);transition:transform .2s}
.qcard:active{transform:scale(.97)}
.qcard .qi{font-size:26px}
.qcard .qt{font-weight:700;font-size:13px;color:#333}
.qcard .qs{font-size:11px;color:#888}

/* Crop grid */
.crop-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 16px;margin-top:12px}
.crop-chip{background:#fff;border-radius:12px;padding:8px 4px;text-align:center;font-size:10px;font-weight:600;color:#555;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.crop-chip .ci{font-size:22px;margin-bottom:2px}

/* Section headers */
.sh{padding:16px 16px 4px;font-size:14px;font-weight:700;color:#333}
.sh small{font-size:11px;color:#888;font-weight:400;display:block;margin-top:2px}

/* Info banner */
.info-banner{margin:16px;background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border-radius:16px;padding:14px 16px;display:flex;gap:10px;align-items:center}
.info-banner .ib-icon{font-size:28px}
.info-banner .ib-title{font-size:12px;font-weight:700;color:#1B5E20}
.info-banner .ib-text{font-size:11px;color:#2E7D32;line-height:1.4}

/* Scanning overlay */
.scan-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200}
.scan-vf{width:240px;height:240px;border:3px solid #4CAF50;border-radius:20px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.scan-vf img{width:100%;height:100%;object-fit:cover;border-radius:17px}
.scan-vf .placeholder{font-size:56px;opacity:.3}
.scan-line{position:absolute;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#4CAF50,transparent);box-shadow:0 0 20px #4CAF50;transition:top .08s linear}
.scan-corner{position:absolute;width:28px;height:28px;border-color:#4CAF50;border-style:solid;border-width:0}
.sc-tl{top:0;left:0;border-top-width:3px;border-left-width:3px;border-top-left-radius:8px}
.sc-tr{top:0;right:0;border-top-width:3px;border-right-width:3px;border-top-right-radius:8px}
.sc-bl{bottom:0;left:0;border-bottom-width:3px;border-left-width:3px;border-bottom-left-radius:8px}
.sc-br{bottom:0;right:0;border-bottom-width:3px;border-right-width:3px;border-bottom-right-radius:8px}
.scan-overlay .label{color:#fff;font-size:13px;font-weight:600;margin-bottom:16px}
.scan-pbar{margin-top:20px;width:180px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);overflow:hidden}
.scan-pfill{height:100%;background:#4CAF50;border-radius:2px;transition:width .08s}
.scan-pct{color:rgba(255,255,255,.5);font-size:11px;margin-top:8px}

/* Diagnosis */
.diag{margin:16px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.diag-hdr{padding:20px 18px;color:#fff}
.diag-hdr .crop-icon{font-size:34px}
.diag-hdr h2{font-size:18px;font-weight:800;margin:6px 0 2px}
.diag-hdr .crop-name{font-size:12px;opacity:.85}
.sev-badge{display:inline-flex;align-items:center;gap:4px;border-radius:16px;padding:3px 10px;font-size:11px;font-weight:700}
.conf-row{display:flex;justify-content:space-between;font-size:10px;opacity:.85;margin:12px 0 4px}
.conf-bar{height:5px;border-radius:3px;background:rgba(255,255,255,.25);overflow:hidden}
.conf-fill{height:100%;border-radius:3px;transition:width 1s ease-out}

.diag-sec{padding:14px 18px;border-bottom:1px solid #F0F0F0}
.diag-sec h3{font-size:13px;font-weight:700;color:#333;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.diag-sec p{font-size:13px;color:#555;line-height:1.7}
.diag-sec .steps{font-size:13px;color:#555;line-height:1.8;white-space:pre-line}
.diag-btns{padding:12px 18px 18px;display:flex;flex-direction:column;gap:8px}

/* Buttons */
.btn-primary{background:linear-gradient(135deg,#1B5E20,#2E7D32);color:#fff;border:none;border-radius:14px;padding:13px 20px;font-size:14px;font-weight:700;cursor:pointer;width:100%;box-shadow:0 4px 16px rgba(27,94,32,.25);transition:transform .2s}
.btn-primary:active{transform:scale(.97)}
.btn-outline{background:transparent;color:#1B5E20;border:2px solid #1B5E20;border-radius:14px;padding:11px 20px;font-size:13px;font-weight:700;cursor:pointer;width:100%;transition:transform .2s}
.btn-outline:active{transform:scale(.97)}

/* Chat */
.chat-box{margin:16px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.chat-hdr{padding:12px 16px;border-bottom:1px solid #F0F0F0;display:flex;align-items:center;gap:10px}
.chat-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#1B5E20,#4CAF50);display:flex;align-items:center;justify-content:center;font-size:18px}
.chat-hdr .ch-title{font-size:14px;font-weight:700;color:#333}
.chat-hdr .ch-sub{font-size:10px;color:#4CAF50;font-weight:600}
.chat-msgs{padding:12px 14px;max-height:350px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.chat-msgs:empty::after{content:'';display:none}
.msg{max-width:85%;padding:10px 14px;font-size:13px;line-height:1.6;animation:msgIn .3s ease-out}
.msg-ai{background:#F0F7F0;color:#333;border-radius:16px 16px 16px 4px;align-self:flex-start}
.msg-user{background:linear-gradient(135deg,#1B5E20,#2E7D32);color:#fff;border-radius:16px 16px 4px 16px;align-self:flex-end}
.msg-typing{align-self:flex-start;background:#F0F7F0;border-radius:16px 16px 16px 4px;padding:10px 18px;font-size:18px;letter-spacing:4px;color:#999}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.chat-input{display:flex;gap:8px;padding:10px 14px;border-top:1px solid #F0F0F0;background:#FAFAFA}
.chat-input input{flex:1;border:2px solid #E0E0E0;border-radius:22px;padding:10px 16px;font-size:13px;outline:none;background:#fff;transition:border-color .2s}
.chat-input input:focus{border-color:#4CAF50}
.chat-input button{background:linear-gradient(135deg,#1B5E20,#2E7D32);color:#fff;border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}

/* Plant list */
.plant-card{background:#fff;border-radius:16px;padding:14px;margin:0 16px 10px;box-shadow:0 2px 10px rgba(0,0,0,.05);cursor:pointer;transition:transform .2s;display:flex;align-items:center;gap:12px;border-left:4px solid transparent}
.plant-card:active{transform:scale(.98)}
.plant-card.treating{border-left-color:#FF9800}
.plant-card.recovered{border-left-color:#4CAF50}
.plant-card .pc-icon{font-size:30px}
.plant-card .pc-info{flex:1}
.plant-card .pc-name{font-size:14px;font-weight:700;color:#333}
.plant-card .pc-disease{font-size:11px;color:#888;margin-top:1px}
.plant-card .pc-date{font-size:10px;color:#bbb;margin-top:3px}
.status-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px}
.status-tag.treating{background:#FFF3E0;color:#E65100}
.status-tag.recovered{background:#E8F5E9;color:#2E7D32}

/* Garden stats */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px;margin:12px 0}
.stat-card{border-radius:14px;padding:14px 10px;text-align:center}
.stat-card .sv{font-size:26px;font-weight:800}
.stat-card .sl{font-size:10px;font-weight:600;margin-top:2px}
.health-bar-wrap{margin:0 16px 16px;background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.health-bar{height:10px;border-radius:5px;background:#F0F0F0;overflow:hidden;display:flex;margin:8px 0 4px}
.health-bar .hb-good{background:linear-gradient(90deg,#4CAF50,#66BB6A);transition:width .5s}
.health-bar .hb-treat{background:linear-gradient(90deg,#FF9800,#FFB74D);transition:width .5s}

/* Timeline */
.timeline{padding:0 18px 12px}
.tl-item{display:flex;gap:10px;margin-bottom:14px;align-items:flex-start}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.tl-text{font-size:12px;font-weight:600;color:#333}
.tl-date{font-size:10px;color:#999}

/* Season tabs */
.season-tabs{display:flex;gap:8px;padding:0 16px;overflow-x:auto;margin:12px 0}
.season-tab{border-radius:14px;padding:10px 16px;cursor:pointer;text-align:center;min-width:100px;flex-shrink:0;font-size:12px;font-weight:600;transition:all .2s;border:2px solid #E0E0E0;color:#666;background:#fff}
.season-tab.active{background:linear-gradient(135deg,#1B5E20,#2E7D32);color:#fff;border-color:transparent}
.season-tab small{display:block;font-size:9px;font-weight:400;margin-top:2px;opacity:.8}
.tip-card{background:#fff;border-radius:14px;padding:12px 14px;margin:0 16px 8px;box-shadow:0 1px 6px rgba(0,0,0,.04);display:flex;gap:10px;align-items:flex-start;border:1px solid #E8F5E9}
.tip-icon{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#E8F5E9,#C8E6C9);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.tip-text{font-size:12px;color:#444;line-height:1.6}
.pro-tip{margin:12px 16px;background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border-radius:16px;padding:16px}
.pro-tip h4{font-size:13px;font-weight:700;color:#1B5E20;margin-bottom:6px}
.pro-tip p{font-size:12px;color:#2E7D32;line-height:1.7}

/* Empty state */
.empty{text-align:center;padding:40px 28px;color:#999}
.empty .ei{font-size:48px;margin-bottom:10px}
.empty h3{font-size:15px;color:#666;font-weight:600}
.empty p{font-size:12px;margin-top:4px;line-height:1.5}

/* Note input */
.note-input{display:flex;gap:8px;padding:12px 18px}
.note-input input{flex:1;border:2px solid #E0E0E0;border-radius:14px;padding:10px 14px;font-size:13px;outline:none;background:#fff}
.note-input input:focus{border-color:#4CAF50}
.note-input button{background:linear-gradient(135deg,#1B5E20,#2E7D32);color:#fff;border:none;border-radius:14px;padding:0 16px;font-size:18px;cursor:pointer}

/* Camera input (hidden) */
#cam-input{display:none}

/* Utilities */
.hidden{display:none!important}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.px16{padding-left:16px;padding-right:16px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<input type="file" id="cam-input" accept="image/*" capture="environment">

<script>
// ============================================================
// ጽቡቕ ተኽሊ — Tsibuk Teklil
// Plant Health Assistant for Eritrean Farmers
// ============================================================

// --- STATE ---
const S = {
  screen: 'home',
  prevScreen: null,
  lang: 'ti',
  scanning: false,
  scanProg: 0,
  scanTimer: null,
  capturedImage: null,
  diagnosis: null,
  chatMsgs: [],
  chatContext: null, // 'diagnosis' or 'general'
  myPlants: [],
  selectedPlantId: null,
  season: 'kremti',
};

function t(ti, en) { return S.lang === 'ti' ? ti : en; }

// --- DATA ---
const CROPS = {
  sorghum: { en:'Sorghum', ti:'ምሸላ', icon:'🌾', color:'#D4A843' },
  teff:    { en:'Teff',    ti:'ጣፍ',  icon:'🌿', color:'#8B7355' },
  barley:  { en:'Barley',  ti:'ስገም', icon:'🌾', color:'#C4A265' },
  wheat:   { en:'Wheat',   ti:'ስርናይ', icon:'🌾', color:'#DAA520' },
  millet:  { en:'Millet',  ti:'ባጽዕ', icon:'🌾', color:'#BDB76B' },
  tomato:  { en:'Tomato',  ti:'ቲማቲም', icon:'🍅', color:'#E74C3C' },
  pepper:  { en:'Pepper',  ti:'በርበረ', icon:'🌶️', color:'#C0392B' },
  onion:   { en:'Onion',   ti:'ሽጉርቲ', icon:'🧅', color:'#E67E22' },
  lentil:  { en:'Lentil',  ti:'ብርሲን', icon:'🫘', color:'#8B6914' },
  banana:  { en:'Banana',  ti:'ሙዝ',  icon:'🍌', color:'#F1C40F' },
  citrus:  { en:'Citrus',  ti:'ኣራንሺ', icon:'🍊', color:'#F39C12' },
  papaya:  { en:'Papaya',  ti:'ፓፓያ', icon:'🥭', color:'#E67E22' },
  coffee:  { en:'Coffee',  ti:'ቡን',  icon:'☕', color:'#6F4E37' },
  maize:   { en:'Maize',   ti:'ዕፉን', icon:'🌽', color:'#F4D03F' },
};

const DISEASES = [
  { id:1, crop:'sorghum', en:'Leaf Blight', ti:'ሕማም ቆጽሊ', severity:'high', confidence:94,
    sympEn:'Large reddish-brown lesions on leaves, starting from lower leaves and moving upward. Leaves may dry out completely.',
    sympTi:'ኣብ ቆጽሊ ዓበይቲ ቀያሕቲ-ቡናዊ ነጠብጣብ ይረአ። ካብ ታሕተዎት ቆጽሊ ጀሚሩ ንላዕሊ ይዝርጋሕ።',
    rxEn:'1. Remove and burn affected leaves immediately\n2. Improve air circulation by wider plant spacing\n3. Apply wood ash around the base of plants\n4. Rotate crops next season — avoid sorghum in the same field',
    rxTi:'1. ዝተበላሸወ ቆጽሊ ቀንጥጦ ኣንድዶ\n2. ኣታኽልቲ ፈላሊኻ ተኸሎም ኣየር ክኣቱ\n3. ኣብ ሱር ኣታኽልቲ ሓመኹሽቲ ዕንጨይቲ ግበር\n4. ዝቕጽል ወቕቲ ዝራእቲ ቀይር',
    prevEn:'Plant resistant varieties. Avoid overhead watering. Remove crop residue after harvest.',
    prevTi:'ተኸላኻሊ ዓይነት ዝራእቲ ተጠቀም። ድሕሪ ዓጺድ ተረፍ ኣጽሪ።' },
  { id:2, crop:'tomato', en:'Early Blight', ti:'ቅድመ-ሕማም ቆጽሊ', severity:'medium', confidence:91,
    sympEn:'Dark concentric rings on lower leaves (target-like pattern). Leaves turn yellow and drop. Fruit may develop dark sunken spots.',
    sympTi:'ኣብ ታሕተዎት ቆጽሊ ጸልማት ዓንኬላት ይረአ። ቆጽሊ ብጫ ኮይኑ ይወድቕ።',
    rxEn:'1. Remove all affected leaves away from garden\n2. Spray with neem leaf solution (crush neem leaves, soak overnight, strain and spray)\n3. Mulch around plants to prevent soil splash\n4. Water at the base only, not from above',
    rxTi:'1. ዝተበላሸወ ቆጽሊ ካብ ጀርዲን ኣርሕቆ\n2. ቆጽሊ ኒም ምስ ማይ ጨፍሊቕካ ንጸግ\n3. ኣብ ሱር ኣታኽልቲ ሻሕ ግበር\n4. ማይ ኣብ ሱር ጥራይ ኣፍስስ',
    prevEn:'Stake tomato plants for air flow. Rotate plots every 2-3 years. Use disease-free seedlings.',
    prevTi:'ቲማቲም ብዘንጊ ደው ኣብሎ። ኣብ 2-3 ዓመት ቦታ ቀይር።' },
  { id:3, crop:'teff', en:'Teff Rust', ti:'ሕማም ዝገት ጣፍ', severity:'high', confidence:88,
    sympEn:'Orange-brown pustules on leaves and stems. Leaves become brittle and break easily. Reduced grain filling.',

  return isTi ? 'ስእሊ ናይ ኣታኽልትኻ ስደድ ወይ ብዛዕባ ማይ ምፍሳስ፣ ምክልኻል ሕማም፣ ወይ ጥዕና መሬት ሕተተኒ።' : 'Send me a photo of your plant, or ask about watering, disease prevention, soil health, or any farming question.';
}

// --- NAVIGATION ---
function go(screen) {
  S.prevScreen = S.screen;
  S.screen = screen;
  render();
}

// --- CAMERA & SCAN ---
function openCamera() {
  document.getElementById('cam-input').click();
}

function startScan(imgSrc) {
  S.capturedImage = imgSrc;
  S.scanning = true;
  S.scanProg = 0;
  render();
  S.scanTimer = setInterval(() => {
    S.scanProg += 3;
    const line = document.getElementById('scan-line');
    const fill = document.getElementById('scan-pfill');
    const pct = document.getElementById('scan-pct');
    if (line) line.style.top = (S.scanProg % 100) + '%';
    if (fill) fill.style.width = Math.min(S.scanProg, 100) + '%';
    if (pct) pct.textContent = Math.min(S.scanProg, 100) + '%';
    if (S.scanProg >= 100) {
      clearInterval(S.scanTimer);
      finishScan();
    }
  }, 50);
}

function finishScan() {
  S.scanning = false;
  const d = DISEASES[Math.floor(Math.random() * DISEASES.length)];
  const c = CROPS[d.crop];
  S.diagnosis = { disease: d, crop: c };
  S.chatContext = 'diagnosis';
  S.chatMsgs = [{ role:'ai', text: t('ሰላም! ኣብ '+c.ti+' '+d.ti+' ረኺበ። ብዛዕባ ሕክምና ወይ ምክልኻል ሕተተኒ።', 'Hello! I found '+d.en+' on your '+c.en+'. Ask me anything about treatment or prevention.') }];
  go('diagnosis');
}

// --- PLANT TRACKING ---
function savePlant() {
  if (!S.diagnosis) return;
  const p = {
    id: Date.now(),
    crop: S.diagnosis.crop,
    disease: S.diagnosis.disease,
    date: new Date().toLocaleDateString(),
    status: 'treating',
    timeline: [{ date: new Date().toLocaleDateString(), text: t('ሕማም ተረኺቡ','Disease detected'), sev:'high' }],
  };
  S.myPlants.push(p);
  go('plants');
}

function markRecovered(id) {
  const p = S.myPlants.find(x => x.id === id);
  if (p) {
    p.status = 'recovered';
    p.timeline.push({ date: new Date().toLocaleDateString(), text: t('ተሓውዩ!','Recovered!'), sev:'low' });
    render();
  }
}

// --- CHAT ---
function sendChat() {
  const inp = document.getElementById('chat-inp');
  if (!inp || !inp.value.trim()) return;
  const msg = inp.value.trim();
  inp.value = '';
  S.chatMsgs.push({ role:'user', text: msg });
  render();
  // Scroll to bottom
  setTimeout(() => {
    const box = document.getElementById('chat-msgs');
    if (box) box.scrollTop = box.scrollHeight;
  }, 50);
  // Typing indicator
  S.chatMsgs.push({ role:'typing' });
  render();
  setTimeout(() => {
    S.chatMsgs = S.chatMsgs.filter(m => m.role !== 'typing');
    const reply = aiReply(msg, S.diagnosis ? S.diagnosis.disease : null);
    S.chatMsgs.push({ role:'ai', text: reply });
    render();
    setTimeout(() => {
      const box = document.getElementById('chat-msgs');
      if (box) box.scrollTop = box.scrollHeight;
    }, 50);
  }, 800 + Math.random() * 600);
}

// RENDER
// ============================================================
function render() {
  const app = document.getElementById('app');
  let html = '';

  // --- HEADER ---
  const showBack = S.screen !== 'home';
  html += '<div class="hdr">';
  html += '<div class="hdr-left">';
  if (showBack) html += '<button class="back" style="display:block" onclick="go(\'home\')">←</button>';
  html += '<div><h1>🌱 ጽቡቕ ተኽሊ</h1><small>Tsibuk Teklil · Plant Health AI</small></div>';
  html += '</div>';
  html += '<button class="lang" onclick="S.lang=S.lang===\'ti\'?\'en\':\'ti\';render()">' + (S.lang==='ti'?'EN':'ትግ') + '</button>';
  html += '</div>';

  // --- SCREENS ---
  html += '<div style="padding-bottom:20px">';

  if (S.screen === 'home') html += renderHome();
  else if (S.screen === 'diagnosis') html += renderDiagnosis();
  else if (S.screen === 'chat') html += renderChat();
  else if (S.screen === 'plants') html += renderPlants();
  else if (S.screen === 'plantDetail') html += renderPlantDetail();
  else if (S.screen === 'garden') html += renderGarden();
  else if (S.screen === 'tips') html += renderTips();

  html += '</div>';

  // --- NAV ---
  html += '<div class="nav">';
  const navItems = [
    { id:'home', icon:'🏠', label:t('ገዛ','Home') },
    { id:'garden', icon:'🏡', label:t('ጀርዲን','Garden') },
    { id:'scan', icon:'📸', label:t('ስኣል','Scan') },
    { id:'plants', icon:'📋', label:t('ዝርዝር','Plants') },
    { id:'tips', icon:'📅', label:t('ምኽሪ','Tips') },
  ];
  navItems.forEach(n => {
    const active = S.screen === n.id ? ' active' : '';
    const isScan = n.id === 'scan';
    const cls = 'nav-item' + active + (isScan ? ' scan-btn' : '');
    const onclick = isScan ? 'openCamera()' : "go('"+n.id+"')";
    html += '<div class="'+cls+'" onclick="'+onclick+'">';
    html += '<span class="ico">' + n.icon + '</span>';
    html += '<span>' + n.label + '</span>';
    html += '</div>';
  });
  html += '</div>';

  // --- SCAN OVERLAY ---
  if (S.scanning) {
    html += '<div class="scan-overlay">';
    html += '<div class="label">' + t('ኣታኽልቲ ይምርመር ኣሎ...','Analyzing plant...') + '</div>';
    html += '<div class="scan-vf">';
    if (S.capturedImage) html += '<img src="'+S.capturedImage+'" alt="">';
    else html += '<span class="placeholder">🌿</span>';
    html += '<div class="scan-line" id="scan-line" style="top:0%"></div>';
    html += '<div class="scan-corner sc-tl"></div><div class="scan-corner sc-tr"></div>';
    html += '<div class="scan-corner sc-bl"></div><div class="scan-corner sc-br"></div>';
    html += '</div>';
    html += '<div class="scan-pbar"><div class="scan-pfill" id="scan-pfill" style="width:0%"></div></div>';
    html += '<div class="scan-pct" id="scan-pct">0%</div>';
    html += '</div>';
  }

  app.innerHTML = html;
}

  h += '</div>';

  // Health bar
  const goodPct = total > 0 ? Math.round((recovered/total)*100) : 0;
  const treatPct = total > 0 ? Math.round((treating/total)*100) : 0;
  h += '<div class="health-bar-wrap">';
  h += '<div style="font-size:13px;font-weight:700;color:#333">'+t('ጥዕና ጀርዲን','Garden Health')+'</div>';
  h += '<div class="health-bar"><div class="hb-good" style="width:'+goodPct+'%"></div><div class="hb-treat" style="width:'+treatPct+'%"></div></div>';
  h += '<div style="display:flex;justify-content:space-between;font-size:10px;color:#888">';
  h += '<span>'+goodPct+'% '+t('ጥዑይ','healthy')+'</span><span>'+treatPct+'% '+t('ይሕከም','treating')+'</span>';
  h += '</div></div>';

  // Plants
  S.myPlants.forEach(p => {
    h += '<div class="plant-card '+p.status+'" onclick="S.selectedPlantId='+p.id+';go(\'plantDetail\')">';
    h += '<span class="pc-icon">'+p.crop.icon+'</span>';
    h += '<div class="pc-info"><div class="pc-name">'+(S.lang==='ti'?p.crop.ti:p.crop.en)+'</div>';
    h += '<div class="pc-disease">'+(S.lang==='ti'?p.disease.ti:p.disease.en)+'</div></div>';
    h += '<span class="status-tag '+p.status+'">'+(p.status==='recovered'?'✅':'⏳')+'</span>';
    h += '</div>';
  });
  return h;
}

function renderTips() {
  let h = '<div class="sh">📅 '+t('ወቕታዊ ምኽሪ','Seasonal Tips')+'<small>'+t('ንወቕቲ ዝሰማማዕ ምኽሪ','Advice for the current season')+'</small></div>';

  // Season tabs
  h += '<div class="season-tabs">';
  Object.entries(SEASONS).forEach(([key, s]) => {
    const active = S.season === key ? ' active' : '';
    h += '<div class="season-tab'+active+'" onclick="S.season=\''+key+'\';render()">';
    h += (S.lang==='ti'?s.ti:s.en) + '<small>'+s.months+'</small></div>';
  });
  h += '</div>';

  // Tips
  const season = SEASONS[S.season];
  season.tips.forEach(tip => {
    h += '<div class="tip-card"><div class="tip-icon">'+tip.icon+'</div>';
    h += '<div class="tip-text">'+(S.lang==='ti'?tip.ti:tip.en)+'</div></div>';
  });

  // Pro tip
  h += '<div class="pro-tip"><h4>💡 '+t('ፍሉይ ምኽሪ','Pro Tip')+'</h4>';
  h += '<p>'+(S.lang==='ti'?season.proTi:season.proEn)+'</p></div>';
  return h;
}

// --- UTILS ---
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- CAMERA HANDLER ---
document.getElementById('cam-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    startScan(ev.target.result);
  };
  reader.readAsDataURL(file);
  this.value = ''; // reset so same file can be selected again
});

// --- INIT ---
render();

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
</script>
</body>
</html>
